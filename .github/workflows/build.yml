name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:
    inputs:
      system:
        required: true
        type: string
      os:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: nix build ${{ inputs.system && format('.#packages.{0}.default', inputs.system) || '' }}

      - name: Package
        if: ${{ inputs.system }}
        run: tar czf rns-proxy-${{ inputs.system }}.tar.gz -C result/bin rns-proxy

      - name: Upload artifact
        if: ${{ inputs.system }}
        uses: actions/upload-artifact@v4
        with:
          name: rns-proxy-${{ inputs.system }}
          path: rns-proxy-${{ inputs.system }}.tar.gz
